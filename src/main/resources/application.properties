# ===============================
# APP NAME
# ===============================
spring.application.name=airBnbApp

# ===============================
# SERVER (CRITICAL FOR AWS)
# ===============================
server.port=5000
server.address=0.0.0.0

# ===============================
# DATABASE (SAFE CONFIG)
# ===============================
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/airBnb}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:bhumi2605}
spring.datasource.driver-class-name=org.postgresql.Driver

# Prevent crash if DB not ready
spring.datasource.hikari.initialization-fail-timeout=0

# ===============================
# JPA / HIBERNATE
# ===============================
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# ===============================
# SQL INIT SAFETY
# ===============================
spring.sql.init.mode=never
spring.jpa.defer-datasource-initialization=true

# ===============================
# PERFORMANCE / STABILITY
# ===============================
spring.main.lazy-initialization=true

# ===============================
# LOGGING
# ===============================
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.orm.jdbc.bind=TRACE
logging.level.org.springframework=INFO

# ===============================
# JWT CONFIG
# ===============================
jwt.secretKey=${JWT_SECRET:your_super_secret_key}

# ===============================
# FRONTEND URL (FIXED )
# ===============================
frontend.url=${FRONTEND_URL:http://localhost:5173}

